
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile | Burnout Tracker</title>

    <link rel="stylesheet" href="profile.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">

            <i class="fa-solid fa-heart-pulse"></i>

            <h2>BurnoutTracker</h2>

        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="dashboard.html">Dashboard</a>

            <a href="history.html">History</a>

        </nav>

    </header>



    <!-- Profile Section -->

    <section class="profile-section">

        <div class="profile-card">

            <h1>Create Your Profile</h1>

            <p>

                Complete your profile before starting your
                daily burnout monitoring.

            </p>


            <!-- Profile Picture -->

            <div class="profile-image">

                <img src="assets/images/profile.png"
                alt="Profile Picture"
                id="previewImage">

                <input
                type="file"
                id="profilePic"
                accept="image/*">

            </div>


            <!-- Form -->

            <form id="profileForm">

                <div class="input-group">

                    <label>Full Name</label>

                    <input
                    type="text"
                    id="name"
                    placeholder="Enter your full name"
                    required>

                </div>



                <div class="input-group">

                    <label>Email</label>

                    <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                </div>



                <div class="input-group">

                    <label>College Name</label>

                    <input
                    type="text"
                    id="college"
                    placeholder="College Name"
                    required>

                </div>



                <div class="input-group">

                    <label>Course</label>

                    <select id="course">

                        <option>Select Course</option>

                        <option>B.Tech CSE</option>

                        <option>B.Tech IT</option>

                        <option>BCA</option>

                        <option>MCA</option>

                        <option>B.Sc</option>

                        <option>Other</option>

                    </select>

                </div>



                <div class="input-group">

                    <label>Academic Year</label>

                    <select id="year">

                        <option>Select Year</option>

                        <option>1st Year</option>

                        <option>2nd Year</option>

                        <option>3rd Year</option>

                        <option>4th Year</option>

                    </select>

                </div>



                <div class="input-group">

                    <label>Age</label>

                    <input
                    type="number"
                    id="age"
                    placeholder="Enter Age">

                </div>



                <div class="input-group">

                    <label>Gender</label>

                    <div class="gender">

                        <label>

                            <input
                            type="radio"
                            name="gender"
                            value="Male">

                            Male

                        </label>


                        <label>

                            <input
                            type="radio"
                            name="gender"
                            value="Female">

                            Female

                        </label>


                        <label>

                            <input
                            type="radio"
                            name="gender"
                            value="Other">

                            Other

                        </label>

                    </div>

                </div>



                <div class="input-group">

                    <label>Daily Study Goal (Hours)</label>

                    <input
                    type="number"
                    id="goal"
                    placeholder="Example : 6">

                </div>



                <div class="input-group">

                    <label>Short Bio</label>

                    <textarea
                    id="bio"
                    rows="5"
                    placeholder="Write something about yourself..."></textarea>

                </div>



                <button type="submit">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Profile

                </button>

            </form>

        </div>

    </section>



    <!-- Footer -->

    <footer>

        <p>

            © 2026 Student Burnout Detection &
            Well-Being Monitoring System

        </p>

    </footer>

    <script src="profile.js"></script>

</body>
</html>
